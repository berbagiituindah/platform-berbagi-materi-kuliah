<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Alumni MAN 1 Bekasi</title>
    <!-- Font Poppins untuk tampilan modern -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome untuk Icon Interaktif -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #1a4331; /* Hijau tua mewah */
            --soft-green: #e2f0e9; /* Hijau soft mint */
            --accent-gold: #d4af37; /* Aksen emas */
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--soft-green);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- Panel Kiri (Ilustrasi & Karakter MAN) --- */
        .left-panel {
            flex: 1.2;
            background: linear-gradient(135deg, rgba(26,67,49,0.9) 0%, rgba(42,109,79,0.9) 100%), 
                        url('https://images.unsplash.com/photo-1577896851231-70ef18881754?q=80&w=1000&auto=format&fit=crop') center/cover;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem;
            position: relative;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/arabesque.png');
            opacity: 0.1;
        }

        .madrasah-badge {
            background: var(--accent-gold);
            color: var(--primary-green);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 20px;
            width: fit-content;
        }

        .left-panel h1 {
            font-size: 3rem;
            line-height: 1.2;
            margin-bottom: 15px;
            font-weight: 700;
            z-index: 1;
        }

        .left-panel p {
            font-size: 1.1rem;
            opacity: 0.9;
            max-width: 80%;
            z-index: 1;
        }

        /* --- Panel Kanan (Form Login) --- */
        .right-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: radial-gradient(circle at top right, #ffffff, var(--soft-green));
        }

        .login-glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 24px;
            width: 85%;
            max-width: 450px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .login-glass-card h2 {
            color: var(--primary-green);
            margin-bottom: 5px;
            font-size: 2rem;
        }

        .login-glass-card p {
            color: #555;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 18px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: 15px;
            color: var(--primary-green);
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 1px solid rgba(26, 67, 49, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            color: var(--primary-green);
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--primary-green);
            background: white;
            box-shadow: 0 0 0 4px rgba(26, 67, 49, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--primary-green);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(26, 67, 49, 0.3);
        }

        .btn-submit:hover {
            background: #112d21;
            transform: translateY(-2px);
        }

        .btn-submit:disabled {
            background: #7f8c8d;
            cursor: not-allowed;
            transform: none;
        }

        .switch-mode-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #444;
        }

        .switch-mode-text span {
            color: var(--primary-green);
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
        }

        /* --- Menu Interaktif (Kanan Float) --- */
        .floating-menu {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 15px 10px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .menu-item {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-green);
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .menu-item:hover {
            background: var(--primary-green);
            color: white;
        }

        .menu-item::after {
            content: attr(data-tooltip);
            position: absolute;
            right: 120%;
            background: var(--primary-green);
            color: white;
            font-size: 0.8rem;
            padding: 5px 10px;
            border-radius: 5px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .menu-item:hover::after {
            opacity: 1;
            visibility: visible;
            right: 140%;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .left-panel { padding: 3rem 2rem; }
            .left-panel h1 { font-size: 2rem; }
            .right-panel { padding: 2rem 0; }
            .floating-menu {
                flex-direction: row;
                position: static;
                transform: none;
                justify-content: center;
                margin-top: 20px;
                border-radius: 15px;
            }
            .menu-item::after { display: none; }
        }
    </style>
</head>
<body>

    <!-- Panel Kiri: Banner Info -->
    <div class="left-panel">
        <div class="madrasah-badge">Kolaborasi & Inspirasi</div>
        <h1>Platform Alumni<br>MAN 1 Bekasi</h1>
        <p>Akses arsip materi kuliah, tugas, dan referensi akademik eksklusif dari sesama alumni untuk mendukung kesuksesan studimu di kampus.</p>
    </div>

    <!-- Panel Kanan: Form Auth -->
    <div class="right-panel">
        <div class="login-glass-card">
            <h2 id="form-title">Selamat Datang</h2>
            <p id="form-desc">Silakan masuk menggunakan email anda</p>
            
            <form id="authForm" onsubmit="handleAuth(event)">
                <!-- Kolom Input Nama Lengkap (Hanya muncul saat klik DAFTAR) -->
                <div class="input-group" id="name-group" style="display: none;">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="namaInput" placeholder="Masukkan Nama Lengkap Anda">
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="emailInput" placeholder="Masukkan email anda" required>
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="passwordInput" placeholder="Kata Sandi" required>
                    <i class="fa-solid fa-eye" id="togglePassword" style="left: auto; right: 15px; cursor: pointer;"></i>
                </div>
                
                <button type="submit" class="btn-submit" id="btn-text">Masuk ke Platform <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i></button>
            </form>

            <div class="switch-mode-text" id="switch-container">
                Belum punya akun? <span onclick="toggleMode('daftar')">Daftar Akun Baru</span>
            </div>
        </div>

        <!-- Menu Interaktif Melayang -->
        <div class="floating-menu">
            <a href="#" class="menu-item" data-tooltip="Beranda"><i class="fa-solid fa-house"></i></a>
            <a href="#" class="menu-item" data-tooltip="Tentang Platform"><i class="fa-solid fa-circle-info"></i></a>
            <a href="#" class="menu-item" data-tooltip="Bantuan & Kontak"><i class="fa-solid fa-headset"></i></a>
        </div>
    </div>

    <!-- Script Interaktif & Logika Autentikasi -->
    <script>
        // URL API Web App Google Apps Script Baru Milikmu
        const API_URL = "https://script.google.com/macros/s/AKfycbxnqdgVL_lAMk6w4suS-CAdGsg7WhDEx8wrsuwtytxbpLLWCkvLZcXNo_sCe1A6ykEWCw/exec";
        
        let isLoginMode = true;

        // Fitur Hide/Show Password
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#passwordInput');

        togglePassword.addEventListener('click', function () {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });

        // Fungsi Penukar Antarmuka Login / Register
        function toggleMode(mode) {
            const nameGroup = document.getElementById('name-group');
            const formTitle = document.getElementById('form-title');
            const formDesc = document.getElementById('form-desc');
            const btnText = document.getElementById('btn-text');
            const switchContainer = document.getElementById('switch-container');
            const namaInput = document.getElementById('namaInput');

            if (mode === 'daftar') {
                isLoginMode = false;
                formTitle.innerText = "Daftar Alumni";
                formDesc.innerText = "Buat akun baru untuk mengakses platform";
                nameGroup.style.display = "block";
                namaInput.required = true;
                btnText.innerHTML = 'Buat Akun Baru <i class="fa-solid fa-user-plus" style="margin-left: 8px;"></i>';
                switchContainer.innerHTML = 'Sudah punya akun? <span onclick="toggleMode(\'login\')">Masuk Sekarang</span>';
            } else {
                isLoginMode = true;
                formTitle.innerText = "Selamat Datang";
                formDesc.innerText = "Silakan masuk menggunakan email anda";
                nameGroup.style.display = "none";
                namaInput.required = false;
                btnText.innerHTML = 'Masuk ke Platform <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i>';
                switchContainer.innerHTML = 'Belum punya akun? <span onclick="toggleMode(\'daftar\')">Daftar Akun Baru</span>';
            }
        }

        // Jalankan Aksi Form
        async function handleAuth(event) {
            event.preventDefault();
            
            const emailValue = document.getElementById('emailInput').value.trim().toLowerCase();
            const passwordValue = document.getElementById('passwordInput').value;
            const btnSubmit = document.querySelector('.btn-submit');
            
            if (isLoginMode) {
                // ==========================================
                // PROSES VERIFIKASI LOGIN
                // ==========================================
                btnSubmit.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memeriksa Akun...';
                btnSubmit.disabled = true;

                try {
                    const response = await fetch(API_URL);
                    const dataSheets = await response.json();
                    const akunTerdaftar = dataSheets.akunTerdaftar || [];

                    // Mencocokkan email & password dengan data di Google Sheets
                    const userDitemukan = akunTerdaftar.find(user => user.email === emailValue && user.password === passwordValue);

                    if (userDitemukan) {
                        sessionStorage.setItem("isAlumniLoggedIn", "true");
                        sessionStorage.setItem("alumniEmail", emailValue);
                        
                        alert('Login Berhasil! Selamat datang kembali.');
                        window.location.href = 'dashboard.html';
                    } else {
                        alert('Akses Ditolak! Email atau kata sandi Anda salah / belum terdaftar.');
                        resetTombol(btnSubmit);
                    }
                } catch (error) {
                    alert('Gagal terhubung ke database. Cek koneksi internet Anda.');
                    resetTombol(btnSubmit);
                }
            } else {
                // ==========================================
                // PROSES PENDAFTARAN (POST KE GOOGLE SHEETS)
                // ==========================================
                const namaValue = document.getElementById('namaInput').value.trim();
                
                btnSubmit.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Mendaftarkan...';
                btnSubmit.disabled = true;

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            email: emailValue,
                            password: passwordValue,
                            nama: namaValue
                        })
                    });
                    
                    const result = await response.json();
                    
                    if (result.status === "success") {
                        // Menanamkan nama alumni secara permanen di browser local storage agar dibaca dashboard
                        localStorage.setItem("alumniUsername", namaValue);
                        
                        alert('Pendaftaran Berhasil! Akun Anda sudah terdaftar di database.');
                        toggleMode('login'); // Langsung alihkan balik ke menu login
                        document.getElementById('emailInput').value = emailValue; // Mengisi otomatis kolom email
                    } else {
                        alert('Gagal Mendaftar: ' + result.message);
                    }
                    resetTombol(btnSubmit);
                } catch (error) {
                    alert('Terjadi kesalahan saat mengirim data pendaftaran.');
                    resetTombol(btnSubmit);
                }
            }
        }

        function resetTombol(btn) {
            btn.disabled = false;
            if (isLoginMode) {
                btn.innerHTML = 'Masuk ke Platform <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i>';
            } else {
                btn.innerHTML = 'Buat Akun Baru <i class="fa-solid fa-user-plus" style="margin-left: 8px;"></i>';
            }
        }
    </script>
</body>
</html>
