<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Alumni MAN 1 Bekasi</title>
    <!-- Font Poppins untuk tampilan modern -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome untuk Icon Interaktif -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #1a4331; 
            --soft-green: #e2f0e9; 
            --accent-gold: #d4af37; 
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--soft-green); height: 100vh; display: flex; overflow: hidden; }

        .left-panel {
            flex: 1.2;
            background: linear-gradient(135deg, rgba(26,67,49,0.9) 0%, rgba(42,109,79,0.9) 100%), 
                        url('bg-man1.jpg') center/cover;
            color: white; display: flex; flex-direction: column; justify-content: center; padding: 4rem; position: relative;
        }
        .left-panel::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/arabesque.png'); opacity: 0.1;
        }
        .madrasah-badge {
            background: var(--accent-gold); color: var(--primary-green); padding: 5px 15px;
            border-radius: 20px; font-size: 0.9rem; font-weight: 600; display: inline-block; margin-bottom: 20px; width: fit-content;
        }
        .left-panel h1 { font-size: 3rem; line-height: 1.2; margin-bottom: 15px; font-weight: 700; z-index: 1; }
        .left-panel p { font-size: 1.1rem; opacity: 0.9; max-width: 80%; z-index: 1; }

        .right-panel {
            flex: 1; display: flex; align-items: center; justify-content: center; position: relative;
            background: radial-gradient(circle at top right, #ffffff, var(--soft-green));
        }
        .login-glass-card {
            background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); padding: 3rem; border-radius: 24px; width: 85%; max-width: 450px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .login-glass-card h2 { color: var(--primary-green); margin-bottom: 5px; font-size: 2rem; }
        .login-glass-card p { color: #555; margin-bottom: 25px; font-size: 0.95rem; }

        .input-group { margin-bottom: 18px; position: relative; }
        .input-group i { position: absolute; top: 50%; transform: translateY(-50%); left: 15px; color: var(--primary-green); }
        .input-group input {
            width: 100%; padding: 15px 15px 15px 45px; border: 1px solid rgba(26, 67, 49, 0.2);
            border-radius: 12px; background: rgba(255, 255, 255, 0.6); font-size: 1rem; color: var(--primary-green); outline: none; transition: all 0.3s ease;
        }
        .input-group input:focus { border-color: var(--primary-green); background: white; box-shadow: 0 0 0 4px rgba(26, 67, 49, 0.1); }

        .forgot-password {
            display: block; text-align: right; font-size: 0.85rem; color: var(--primary-green);
            cursor: pointer; margin-top: -10px; margin-bottom: 15px; font-weight: 500; text-decoration: none;
        }
        .forgot-password:hover { text-decoration: underline; }

        .btn-submit {
            width: 100%; padding: 15px; background: var(--primary-green); color: white; border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(26, 67, 49, 0.3);
        }
        .btn-submit:hover { background: #112d21; transform: translateY(-2px); }
        .btn-submit:disabled { background: #7f8c8d; cursor: not-allowed; transform: none; }

        .switch-mode-text { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #444; }
        .switch-mode-text span { color: var(--primary-green); font-weight: 600; cursor: pointer; text-decoration: underline; }

        .floating-menu {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex;
            flex-direction: column; gap: 15px; background: var(--glass-bg); backdrop-filter: blur(10px);
            padding: 15px 10px; border-radius: 30px; border: 1px solid var(--glass-border); box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .menu-item {
            width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: var(--primary-green); text-decoration: none; font-size: 1.2rem; transition: all 0.3s ease; position: relative;
        }
        .menu-item:hover { background: var(--primary-green); color: white; }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            .left-panel { padding: 3rem 2rem; }
            .left-panel h1 { font-size: 2rem; }
            .right-panel { padding: 2rem 0; }
            .floating-menu { display: none; }
        }
    </style>
</head>
<body>

    <div class="left-panel">
        <div class="madrasah-badge">Kolaborasi & Inspirasi</div>
        <h1>Platform Alumni<br>MAN 1 Bekasi</h1>
        <p>Akses arsip materi kuliah, tugas, dan referensi akademik eksklusif dari sesama alumni untuk mendukung kesuksesan studimu di kampus.</p>
    </div>

    <div class="right-panel">
        <div class="login-glass-card">
            <h2 id="form-title">Selamat Datang</h2>
            <p id="form-desc">Silakan masuk menggunakan email Anda</p>
            
            <form id="authForm" onsubmit="handleAuth(event)">
                
                <!-- Input Nama Lengkap (Hanya saat Daftar) -->
                <div class="input-group" id="name-group" style="display: none;">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="namaInput" placeholder="Masukkan Nama Lengkap Anda">
                </div>

                <!-- Input Email -->
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="emailInput" placeholder="Masukkan email Anda" required>
                </div>
                
                <!-- Input Password -->
                <div class="input-group" id="pass-group">
                    <i class="fa-solid fa-lock"></i>
                    <!-- Minimal 5 Karakter -->
                    <input type="password" id="passwordInput" placeholder="Kata Sandi (Min. 5 karakter)" minlength="5" required>
                    <i class="fa-solid fa-eye" id="togglePassword" style="left: auto; right: 15px; cursor: pointer;"></i>
                </div>

                <!-- Tautan Lupa Kata Sandi -->
                <a id="forgot-link" class="forgot-password" onclick="toggleMode('lupa_password')">Lupa kata sandi?</a>
                
                <button type="submit" class="btn-submit" id="btn-text">Masuk ke Platform <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i></button>
            </form>

            <div class="switch-mode-text" id="switch-container">
                Belum punya akun? <span onclick="toggleMode('daftar')">Daftar Akun Baru</span>
            </div>
        </div>

        <div class="floating-menu">
            <a href="#" class="menu-item"><i class="fa-solid fa-house"></i></a>
            <a href="#" class="menu-item"><i class="fa-solid fa-circle-info"></i></a>
            <a href="#" class="menu-item"><i class="fa-solid fa-headset"></i></a>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxEztMg1tP_TPfnlOZs83ayxNCmYMNU5N6_9PgebIv7M_53T3VxjZbxMXraX1oVJK8Ptg/exec";
        let currentMode = "login";

        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#passwordInput');
        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });

        // FUNGSI BARU: Menampilkan notifikasi tanpa Pop-up Alert
        function tampilkanPesan(pesan, tipe) {
            let notifBox = document.getElementById('notif-box');
            if (!notifBox) {
                notifBox = document.createElement('div');
                notifBox.id = 'notif-box';
                notifBox.style.padding = '12px';
                notifBox.style.borderRadius = '8px';
                notifBox.style.marginBottom = '15px';
                notifBox.style.fontSize = '0.85rem';
                notifBox.style.textAlign = 'center';
                notifBox.style.fontWeight = '500';
                
                // Masukkan notifikasi tepat di atas tombol submit
                const btn = document.getElementById('btn-text');
                btn.parentNode.insertBefore(notifBox, btn);
            }
            
            notifBox.style.display = 'block';
            notifBox.innerHTML = pesan;
            
            if (tipe === 'sukses') {
                notifBox.style.backgroundColor = 'rgba(26, 67, 49, 0.1)';
                notifBox.style.color = 'var(--primary-green)';
                notifBox.style.border = '1px solid var(--primary-green)';
            } else {
                notifBox.style.backgroundColor = 'rgba(220, 53, 69, 0.1)';
                notifBox.style.color = '#dc3545';
                notifBox.style.border = '1px solid #dc3545';
            }

            // Otomatis hilang setelah 6 detik
            setTimeout(() => {
                if(notifBox) notifBox.style.display = 'none';
            }, 6000);
        }

        function toggleMode(mode) {
            // Sembunyikan notifikasi saat berpindah halaman
            const notifBox = document.getElementById('notif-box');
            if (notifBox) notifBox.style.display = 'none';

            const nameGroup = document.getElementById('name-group');
            const passGroup = document.getElementById('pass-group');
            const forgotLink = document.getElementById('forgot-link');
            const formTitle = document.getElementById('form-title');
            const formDesc = document.getElementById('form-desc');
            const btnText = document.getElementById('btn-text');
            const switchContainer = document.getElementById('switch-container');
            
            if (mode === 'daftar') {
                currentMode = "daftar";
                formTitle.innerText = "Daftar Alumni";
                formDesc.innerText = "Lengkapi data. Password minimal 5 karakter.";
                nameGroup.style.display = "block";
                passGroup.style.display = "block";
                forgotLink.style.display = "none";
                
                document.getElementById('namaInput').required = true;
                document.getElementById('passwordInput').required = true;
                
                btnText.innerHTML = 'Daftar & Kirim Link <i class="fa-solid fa-paper-plane" style="margin-left: 8px;"></i>';
                switchContainer.innerHTML = 'Sudah punya akun? <span onclick="toggleMode(\'login\')">Masuk Sekarang</span>';
                
            } else if (mode === 'lupa_password') {
                currentMode = "lupa_password";
                formTitle.innerText = "Lupa Kata Sandi";
                formDesc.innerText = "Masukkan email terdaftar untuk menyetel ulang sandi.";
                nameGroup.style.display = "none";
                passGroup.style.display = "none"; 
                forgotLink.style.display = "none";
                
                document.getElementById('namaInput').required = false;
                document.getElementById('passwordInput').required = false;
                
                btnText.innerHTML = 'Kirim Link Reset <i class="fa-solid fa-envelope" style="margin-left: 8px;"></i>';
                switchContainer.innerHTML = 'Ingin kembali? <span onclick="toggleMode(\'login\')">Masuk Sekarang</span>';
                
            } else {
                currentMode = "login";
                formTitle.innerText = "Selamat Datang";
                formDesc.innerText = "Silakan masuk menggunakan email Anda";
                nameGroup.style.display = "none";
                passGroup.style.display = "block";
                forgotLink.style.display = "block";
                
                document.getElementById('namaInput').required = false;
                document.getElementById('passwordInput').required = true;
                
                btnText.innerHTML = 'Masuk ke Platform <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i>';
                switchContainer.innerHTML = 'Belum punya akun? <span onclick="toggleMode(\'daftar\')">Daftar Akun Baru</span>';
            }
        }

        async function handleAuth(event) {
            event.preventDefault();
            const btnSubmit = document.querySelector('.btn-submit');
            
            const emailValue = document.getElementById('emailInput').value.trim().toLowerCase();
            const passwordValue = document.getElementById('passwordInput').value;
            const namaValue = document.getElementById('namaInput').value.trim();

            // Sembunyikan notifikasi lama saat tombol ditekan kembali
            const notifBox = document.getElementById('notif-box');
            if (notifBox) notifBox.style.display = 'none';

            if (currentMode === "login") {
                btnSubmit.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memeriksa...';
                btnSubmit.disabled = true;

                try {
                    const response = await fetch(API_URL);
                    const dataSheets = await response.json();
                    const akunTerdaftar = dataSheets.akunTerdaftar || [];

                    const userDitemukan = akunTerdaftar.find(u => u.email === emailValue && u.password === passwordValue);

                    if (userDitemukan) {
                        if (userDitemukan.status !== "Aktif") {
                            tampilkanPesan('Akses Ditolak! Akun masih PENDING. Silakan cek Gmail Anda dan klik Link Aktivasi.', 'error');
                            resetTombol(btnSubmit);
                            return;
                        }

                        sessionStorage.setItem("isAlumniLoggedIn", "true");
                        sessionStorage.setItem("alumniEmail", emailValue);
                        localStorage.setItem("alumniUsername", userDitemukan.nama); 

                        // Pesan sukses tampil lalu otomatis pindah halaman
                        tampilkanPesan('<i class="fa-solid fa-circle-check"></i> Login Berhasil! Mengalihkan...', 'sukses');
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1200);

                    } else {
                        tampilkanPesan('Akses Ditolak! Email atau kata sandi salah.', 'error');
                        resetTombol(btnSubmit);
                    }
                } catch (error) {
                    tampilkanPesan('Gagal terhubung ke database.', 'error');
                    resetTombol(btnSubmit);
                }

            } else if (currentMode === "daftar") {
                if (passwordValue.length < 5) {
                    tampilkanPesan('Kata sandi harus terdiri dari minimal 5 karakter!', 'error');
                    return;
                }

                btnSubmit.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memproses...';
                btnSubmit.disabled = true;

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: "register",
                            email: emailValue,
                            nama: namaValue,
                            password: passwordValue
                        })
                    });
                    const result = await response.json();

                    if (result.status === "success") {
                        toggleMode('login'); 
                        document.getElementById('emailInput').value = emailValue;
                        tampilkanPesan(result.message, 'sukses');
                        resetTombol(btnSubmit);
                    } else {
                        tampilkanPesan('Gagal: ' + result.message, 'error');
                        resetTombol(btnSubmit);
                    }
                } catch (error) {
                    tampilkanPesan('Gagal memproses pendaftaran.', 'error');
                    resetTombol(btnSubmit);
                }

            } else if (currentMode === "lupa_password") {
                btnSubmit.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Mengirim Link...';
                btnSubmit.disabled = true;

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: "forgot_password",
                            email: emailValue
                        })
                    });
                    const result = await response.json();

                    if (result.status === "success") {
                        toggleMode('login'); 
                        tampilkanPesan(result.message, 'sukses');
                    } else {
                        tampilkanPesan('Gagal: ' + result.message, 'error');
                        resetTombol(btnSubmit);
                    }
                } catch (error) {
                    tampilkanPesan('Gagal memproses permintaan.', 'error');
                    resetTombol(btnSubmit);
                }
            }
        }

        function resetTombol(btn) {
            btn.disabled = false;
            if (currentMode === "login") {
                btn.innerHTML = 'Masuk ke Platform <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i>';
            } else if (currentMode === "daftar") {
                btn.innerHTML = 'Daftar & Kirim Link <i class="fa-solid fa-paper-plane" style="margin-left: 8px;"></i>';
            } else {
                btn.innerHTML = 'Kirim Link Reset <i class="fa-solid fa-envelope" style="margin-left: 8px;"></i>';
            }
        }
    </script>
</body>
</html>
